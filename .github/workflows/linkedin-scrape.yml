name: LinkedIn scrape

on:
  workflow_dispatch:
  # Phase 2: enable scheduled runs
  # schedule:
  #   - cron: "0 9 * * *"  # daily at 09:00 UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: .github/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: .github/scripts/package.json

      - name: Install scrape deps
        run: npm install --no-audit --no-fund

      - name: Run LinkedIn scraper + ingest
        env:
          LI_AT_COOKIE: ${{ secrets.LI_AT_COOKIE }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: npm run scrape:linkedin
